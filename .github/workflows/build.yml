name: Build Multi-Platform

"on":
  push:
    branches: [ "master" ]
    paths:
      - "VERSION"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Show version
        shell: bash
        run: echo "Building version ${{ env.VERSION }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp version into constants.py
        shell: bash
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --collect-all PyQt6 \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "Mocha Tools" \
              mochatools.py
          else
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --collect-all PyQt6 \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "Mocha Tools" \
              mochatools.py
          fi

      - name: Build .deb package (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm
          mkdir -p deb_build/usr/bin
          cp "dist/Mocha Tools" deb_build/usr/bin/mochatools
          chmod 755 deb_build/usr/bin/mochatools
          fpm -s dir -t deb \
            -n mocha-tools \
            -v "${{ env.VERSION }}" \
            --description "Mocha Tools" \
            "deb_build/=/"

      - name: Bundle Linux installer script (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p linux-installer
          cp "dist/Mocha Tools" linux-installer/Mocha-Tools-linux
          chmod +x linux-installer/Mocha-Tools-linux
          cp installer.sh linux-installer/installer.sh
          chmod +x linux-installer/installer.sh
          if [[ -f builditems/debian_ubuntu/icon.png ]]; then
            mkdir -p linux-installer/builditems/debian_ubuntu
            cp builditems/debian_ubuntu/icon.png linux-installer/builditems/debian_ubuntu/icon.png
          fi
          tar -czf "MochaTools-${{ env.VERSION }}-linux.tar.gz" -C linux-installer .

      - name: Build NSIS installer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          choco install nsis --no-progress -y

          if [[ ! -f installer.nsi ]]; then
            echo 'ERROR: installer.nsi not found in repo root.' && exit 1
          fi
          if [[ ! -f 'dist/Mocha Tools.exe' ]]; then
            echo 'ERROR: dist/Mocha Tools.exe not found.' && exit 1
          fi

          cp 'dist/Mocha Tools.exe' Mocha-Tools-windows.exe

          PYTHONUTF8=1 python3 builditems/windows/patch_version.py "${{ env.VERSION }}"

          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' installer.nsi"

      # ── Artifact names now match the release zip names ──
      - name: Upload artifact (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian_ubuntu-${{ env.VERSION }}
          path: |
            *.deb
            MochaTools-*-linux.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ env.VERSION }}
          path: |
            MochaTools-Setup-*.exe

  # ──────────────────────────────────────────────
  # macOS arm64 (Apple Silicon — native)
  # ──────────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-

      - name: Read version
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build arm64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --collect-all PyQt6 \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch arm64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/Mocha Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Mocha Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Mocha Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "MochaTools-${{ env.VERSION }}-macOS-arm64.dmg" \
            "dist/Mocha Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "Mocha Tools" \
                -srcfolder "dist/Mocha Tools.app" \
                -ov -format UDZO \
                "MochaTools-${{ env.VERSION }}-macOS-arm64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-${{ env.VERSION }}
          path: MochaTools-*-macOS-arm64.dmg

  # ──────────────────────────────────────────────
  # macOS x86_64 (Intel — also runs via Rosetta)
  # ──────────────────────────────────────────────
  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-x86-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x86-pip-

      - name: Read version
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build x86_64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --collect-all PyQt6 \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch x86_64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/Mocha Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Mocha Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Mocha Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "MochaTools-${{ env.VERSION }}-macOS-x86_64.dmg" \
            "dist/Mocha Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "Mocha Tools" \
                -srcfolder "dist/Mocha Tools.app" \
                -ov -format UDZO \
                "MochaTools-${{ env.VERSION }}-macOS-x86_64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-${{ env.VERSION }}
          path: MochaTools-*-macOS-x86_64.dmg

  # ──────────────────────────────────────────────
  # Draft release — collects all platform builds
  # ──────────────────────────────────────────────
  release:
    name: Create Draft Release
    needs: [build, build-macos-arm64, build-macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MochaTools v${{ env.VERSION }}
          draft: true
          files: release-assets/**