name: Build Multi-Platform

on:
  push:
    branches: [ "master" ]
    paths:
      - "builditems/windows/**"
      - "builditems/macos/**"
      - "builditems/debian_ubuntu/**"

jobs:
  # ──────────────────────────────────────────────
  # Windows & Linux build (single job, matrix)
  # ──────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version file (Linux only)
        if: matrix.os == 'ubuntu-latest'
        id: version
        run: echo "VERSION=$(cat builditems/debian_ubuntu/VERSION)" >> $GITHUB_ENV

      - name: Show version (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: echo "Building Linux version $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "Mocha Tools" \
              mochatools.py
          else
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "Mocha Tools" \
              mochatools.py
          fi

      - name: Build .deb package (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm
          mkdir -p deb_build/usr/bin
          cp "dist/Mocha Tools" deb_build/usr/bin/mochatools
          chmod 755 deb_build/usr/bin/mochatools
          fpm -s dir -t deb \
            -n mocha-tools \
            -v $VERSION \
            --description "Mocha Tools" \
            deb_build/=/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist/
            *.deb

  # ──────────────────────────────────────────────
  # macOS — build arm64 + x86_64, then lipo merge
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS Universal Binary
    runs-on: ubuntu-latest   # orchestrator only; real work in sub-jobs below
    needs: [build-macos-arm64, build-macos-x86]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download arm64 app
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-app
          path: arm64-dist

      - name: Download x86_64 app
        uses: actions/download-artifact@v4
        with:
          name: macos-x86-app
          path: x86-dist

      # lipo is a macOS tool — run the merge step on a macOS runner
      - name: Merge into universal .app
        runs-on: macos-15
        shell: bash
        run: |
          set -euo pipefail

          ARM_BINARY="arm64-dist/Mocha Tools.app/Contents/MacOS/Mocha Tools"
          X86_BINARY="x86-dist/Mocha Tools.app/Contents/MacOS/Mocha Tools"
          OUT_APP="dist/Mocha Tools.app"

          # Start from the arm64 bundle as base
          cp -R "arm64-dist/Mocha Tools.app" "$OUT_APP"

          # Replace every Mach-O binary inside MacOS/ with a fat universal binary
          find "$OUT_APP/Contents/MacOS" -type f | while read -r arm_file; do
            rel="${arm_file#$OUT_APP/Contents/MacOS/}"
            x86_file="x86-dist/Mocha Tools.app/Contents/MacOS/$rel"
            if [[ -f "$x86_file" ]]; then
              lipo -create "$arm_file" "$x86_file" -output "$arm_file"
            fi
          done

          # Overwrite Info.plist with the canonical one
          cp ./builditems/macos/Info.plist "$OUT_APP/Contents/Info.plist"

          # Zip up the .app so it survives the artifact upload
          cd dist
          zip -r "../Mocha-Tools-macOS-universal.zip" "Mocha Tools.app"

      - name: Upload universal macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-build
          path: Mocha-Tools-macOS-universal.zip

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-15          # Apple Silicon runner (M-series)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-

      - name: Set up Python (arm64 native)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build arm64 .app
        shell: bash
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch arm64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Upload arm64 app
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: dist/

  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-13          # Last Intel runner GitHub provides
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-x86-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x86-pip-

      - name: Set up Python (x86_64 native)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build x86_64 .app
        shell: bash
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch x86_64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Upload x86_64 app
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86-app
          path: dist/