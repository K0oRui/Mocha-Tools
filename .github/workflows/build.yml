name: Build Multi-Platform

on:
  push:
    branches: [ "master" ]
    paths:
      - "builditems/windows/**"
      - "builditems/macos/**"
      - "builditems/debian_ubuntu/**"
      - "VERSION"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Windows & Linux build (single job, matrix)
  # ──────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Show version
        shell: bash
        run: echo "Building version ${{ env.VERSION }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "Mocha Tools" \
              mochatools.py
          else
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "Mocha Tools" \
              mochatools.py
          fi

      - name: Build .deb package (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm
          mkdir -p deb_build/usr/bin
          cp "dist/Mocha Tools" deb_build/usr/bin/mochatools
          chmod 755 deb_build/usr/bin/mochatools
          fpm -s dir -t deb \
            -n mocha-tools \
            -v "${{ env.VERSION }}" \
            --description "Mocha Tools" \
            "deb_build/=/"

      - name: Bundle Linux installer script (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p linux-installer
          cp "dist/Mocha Tools" linux-installer/Mocha-Tools-linux
          chmod +x linux-installer/Mocha-Tools-linux
          cp installer.sh linux-installer/installer.sh
          chmod +x linux-installer/installer.sh
          if [[ -f builditems/debian_ubuntu/icon.png ]]; then
            mkdir -p linux-installer/builditems/debian_ubuntu
            cp builditems/debian_ubuntu/icon.png linux-installer/builditems/debian_ubuntu/icon.png
          fi
          tar -czf "MochaTools-${{ env.VERSION }}-linux.tar.gz" -C linux-installer .

      - name: Build NSIS installer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          choco install nsis --no-progress -y

          if [[ ! -f installer.nsi ]]; then
            echo 'ERROR: installer.nsi not found in repo root.' && exit 1
          fi
          if [[ ! -f 'dist/Mocha Tools.exe' ]]; then
            echo 'ERROR: dist/Mocha Tools.exe not found.' && exit 1
          fi

          cp 'dist/Mocha Tools.exe' Mocha-Tools-windows.exe

          # Stamp version from root VERSION file into installer.nsi and version.txt
          PYTHONUTF8=1 python3 builditems/windows/patch_version.py "${{ env.VERSION }}"

          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' installer.nsi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist/
            *.deb
            *.exe
            MochaTools-Setup-*.exe
            MochaTools-*-linux.tar.gz

  # ──────────────────────────────────────────────
  # macOS — build arm64 + x86_64, then lipo merge
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS Universal Binary
    runs-on: macos-15
    needs: [build-macos-arm64, build-macos-x86]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Download arm64 app
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-app
          path: arm64-dist

      - name: Download x86_64 app
        uses: actions/download-artifact@v4
        with:
          name: macos-x86-app
          path: x86-dist

      - name: Inspect downloaded artifacts
        shell: bash
        run: |
          echo "=== arm64-dist ==="
          find arm64-dist -maxdepth 4
          echo "=== x86-dist ==="
          find x86-dist -maxdepth 4

      - name: Merge into universal .app
        shell: bash
        run: |
          set -euo pipefail

          ARM_APP="arm64-dist/Mocha Tools.app"
          X86_APP="x86-dist/Mocha Tools.app"

          if [[ ! -d "$ARM_APP" ]]; then
            echo "ERROR: arm64 bundle not found at: $ARM_APP" && exit 1
          fi
          if [[ ! -d "$X86_APP" ]]; then
            echo "ERROR: x86_64 bundle not found at: $X86_APP" && exit 1
          fi

          mkdir -p dist
          cp -R "$ARM_APP" "dist/Mocha Tools.app"
          OUT_APP="dist/Mocha Tools.app"

          find "$OUT_APP/Contents/MacOS" -type f | while read -r arm_file; do
            rel="${arm_file#$OUT_APP/Contents/MacOS/}"
            x86_file="$X86_APP/Contents/MacOS/$rel"
            if [[ -f "$x86_file" ]]; then
              echo "lipo merging: $rel"
              lipo -create "$arm_file" "$x86_file" -output "$arm_file"
            fi
          done

          cp ./builditems/macos/Info.plist "$OUT_APP/Contents/Info.plist"

          cd dist
          zip -r "../Mocha-Tools-macOS-universal.zip" "Mocha Tools.app"

      - name: Free up disk space before DMG
        shell: bash
        run: |
          rm -rf arm64-dist x86-dist
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          sudo rm -rf /Library/Developer/CoreSimulator/Volumes/ || true
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Build macOS DMG
        shell: bash
        run: |
          bash builditems/macos/create_dmg.sh "dist/Mocha Tools.app" "${{ env.VERSION }}"

      - name: Upload universal macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-build
          path: |
            Mocha-Tools-macOS-universal.zip
            MochaTools-*-macOS.dmg

  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-

      - name: Set up Python (arm64 native)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build arm64 .app
        shell: bash
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch arm64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Upload arm64 app
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: dist/

  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-x86-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x86-pip-

      - name: Set up Python (x86_64 native)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build x86_64 .app
        shell: bash
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch x86_64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Upload x86_64 app
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86-app
          path: dist/

  # ──────────────────────────────────────────────
  # Publish GitHub Release with all three assets
  # ──────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '\r\n')" >> $GITHUB_OUTPUT

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-build
          path: release-assets/windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-build
          path: release-assets/linux

      - name: Download macOS universal build
        uses: actions/download-artifact@v4
        with:
          name: macos-universal-build
          path: release-assets/macos

      - name: Rename assets to expected names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p final-assets

          WIN_EXE=$(find release-assets/windows -name "Mocha Tools.exe" | head -1)
          cp "$WIN_EXE" "final-assets/Mocha-Tools-windows.exe"

          SETUP=$(find release-assets/windows -name "MochaTools-Setup-*.exe" | head -1)
          if [[ -f "$SETUP" ]]; then
            cp "$SETUP" "final-assets/$(basename $SETUP)"
          fi

          LIN_BIN=$(find release-assets/linux -name "Mocha Tools" -not -name "*.deb" | head -1)
          cp "$LIN_BIN" "final-assets/Mocha-Tools-linux"
          chmod +x "final-assets/Mocha-Tools-linux"

          DEB=$(find release-assets/linux -name "*.deb" | head -1)
          if [[ -f "$DEB" ]]; then
            cp "$DEB" "final-assets/mocha-tools-${{ steps.version.outputs.VERSION }}.deb"
          fi

          cp "release-assets/macos/Mocha-Tools-macOS-universal.zip" \
             "final-assets/Mocha-Tools-macOS-universal.zip"

          DMG=$(find release-assets/macos -name "MochaTools-*-macOS.dmg" | head -1)
          if [[ -f "$DMG" ]]; then
            cp "$DMG" "final-assets/$(basename $DMG)"
          fi

          TARBALL=$(find release-assets/linux -name "MochaTools-*-linux.tar.gz" | head -1)
          if [[ -f "$TARBALL" ]]; then
            cp "$TARBALL" "final-assets/$(basename $TARBALL)"
          fi

          echo "=== Release assets ==="
          ls -lh final-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Mocha Tools ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
          files: |
            final-assets/Mocha-Tools-windows.exe
            final-assets/MochaTools-Setup-*.exe
            final-assets/Mocha-Tools-linux
            final-assets/MochaTools-*-linux.tar.gz
            final-assets/Mocha-Tools-macOS-universal.zip
            final-assets/MochaTools-*-macOS.dmg
            final-assets/mocha-tools-*.deb