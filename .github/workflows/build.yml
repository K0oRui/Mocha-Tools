name: Build Multi-Platform

"on":
  push:
    branches: [ "master" ]
    paths:
      - "VERSION"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Show version
        shell: bash
        run: echo "Building version ${{ env.VERSION }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp version into constants.py
        shell: bash
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --collect-all PyQt6 \
              --hidden-import keyring.backends.Windows \
              --hidden-import keyring.backends.fail \
              --hidden-import keyring.backends.null \
              --version-file ./builditems/windows/version.txt \
              --icon=./builditems/windows/icon.ico \
              --name "Mocha Tools" \
              mochatools.py
          else
            pyinstaller --onefile --noconsole \
              --collect-submodules mochatools_app \
              --collect-all PyQt6 \
              --hidden-import keyring.backends.SecretService \
              --hidden-import keyring.backends.kwallet \
              --hidden-import keyring.backends.fail \
              --hidden-import keyring.backends.null \
              --icon=./builditems/debian_ubuntu/icon.png \
              --name "Mocha Tools" \
              mochatools.py
          fi

      - name: Build .deb packages (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

          mkdir -p deb_build/usr/bin
          cp "dist/Mocha Tools" deb_build/usr/bin/mochatools
          chmod 755 deb_build/usr/bin/mochatools

          # Icon — goes into the hicolor theme so App Center picks it up
          mkdir -p deb_build/usr/share/icons/hicolor/256x256/apps
          cp builditems/debian_ubuntu/icon.png \
            deb_build/usr/share/icons/hicolor/256x256/apps/mocha-tools.png

          # .desktop entry — use printf to avoid heredoc/YAML conflicts
          mkdir -p deb_build/usr/share/applications
          printf '[Desktop Entry]\nType=Application\nName=Mocha Tools\nGenericName=File Manager\nComment=File sharing and management by nxllxvxxd2\nExec=/usr/bin/mochatools\nIcon=mocha-tools\nCategories=Utility;FileManager;\nTerminal=false\nStartupNotify=true\n' \
            > deb_build/usr/share/applications/mocha-tools.desktop

          mkdir -p deb_out

          for arch in amd64 x86_64 arm64; do
            fpm -s dir -t deb \
              -n "Mocha Tools" \
              -v "${{ env.VERSION }}" \
              -a "$arch" \
              -p "deb_out/mocha-tools_${{ env.VERSION }}_${arch}.deb" \
              --description "File sharing and management by nxllxvxxd2" \
              --vendor "nxllxvxxd2" \
              --maintainer "nxllxvxxd2" \
              --url "https://github.com/nxllxvxxd2/mochatools" \
              "deb_build/=/"
          done

      - name: Bundle Linux installer script (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p linux-installer
          cp "dist/Mocha Tools" linux-installer/Mocha-Tools-linux
          chmod +x linux-installer/Mocha-Tools-linux
          cp installer.sh linux-installer/installer.sh
          chmod +x linux-installer/installer.sh
          if [[ -f builditems/debian_ubuntu/icon.png ]]; then
            mkdir -p linux-installer/builditems/debian_ubuntu
            cp builditems/debian_ubuntu/icon.png linux-installer/builditems/debian_ubuntu/icon.png
          fi
          tar -czf "MochaTools-${{ env.VERSION }}-linux.tar.gz" -C linux-installer .

      - name: Build NSIS installer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          choco install nsis --no-progress -y

          if [[ ! -f installer.nsi ]]; then
            echo 'ERROR: installer.nsi not found in repo root.' && exit 1
          fi
          if [[ ! -f 'dist/Mocha Tools.exe' ]]; then
            echo 'ERROR: dist/Mocha Tools.exe not found.' && exit 1
          fi

          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' /DAPP_VERSION=${{ env.VERSION }} installer.nsi"

      - name: Upload .deb artifacts (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian_ubuntu-deb-${{ env.VERSION }}
          path: deb_out/*.deb

      - name: Upload Linux tarball (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian_ubuntu-tar-${{ env.VERSION }}
          path: MochaTools-${{ env.VERSION }}-linux.tar.gz

      - name: Upload portable exe (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ env.VERSION }}
          path: dist/Mocha Tools.exe

      - name: Upload installer exe (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: MochaTools-Setup-*.exe

  # ──────────────────────────────────────────────
  # macOS arm64 (Apple Silicon — native)
  # ──────────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS (arm64)
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-arm64-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-arm64-pip-

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build arm64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --collect-all PyQt6 \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --hidden-import keyring.backends.null \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch arm64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/Mocha Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Mocha Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Mocha Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "MochaTools-${{ env.VERSION }}-macOS-arm64.dmg" \
            "dist/Mocha Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "Mocha Tools" \
                -srcfolder "dist/Mocha Tools.app" \
                -ov -format UDZO \
                "MochaTools-${{ env.VERSION }}-macOS-arm64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-${{ env.VERSION }}
          path: MochaTools-*-macOS-arm64.dmg

  # ──────────────────────────────────────────────
  # macOS x86_64 (Intel — also runs via Rosetta)
  # ──────────────────────────────────────────────
  build-macos-x86:
    name: Build macOS (x86_64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-x86-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-x86-pip-

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Stamp version into constants.py
        run: python builditems/stamp_version.py "${{ env.VERSION }}"

      - name: Build x86_64 .app
        run: |
          pyinstaller --noconsole --windowed \
            --collect-submodules mochatools_app \
            --collect-all PyQt6 \
            --hidden-import keyring.backends.macOS \
            --hidden-import keyring.backends.fail \
            --hidden-import keyring.backends.null \
            --icon=./builditems/macos/icon.icns \
            --osx-bundle-identifier com.nxllxvxxd2.mochatools \
            --target-arch x86_64 \
            --name "Mocha Tools" \
            mochatools.py

      - name: Stamp version into Info.plist
        run: |
          python3 builditems/macos/patch_info_plist.py "dist/Mocha Tools.app/Contents/Info.plist" "${{ env.VERSION }}"

      - name: Build DMG
        run: |
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Mocha Tools" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Mocha Tools.app" 130 160 \
            --app-drop-link 390 160 \
            --no-internet-enable \
            "MochaTools-${{ env.VERSION }}-macOS-x86_64.dmg" \
            "dist/Mocha Tools.app" || {
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create \
                -volname "Mocha Tools" \
                -srcfolder "dist/Mocha Tools.app" \
                -ov -format UDZO \
                "MochaTools-${{ env.VERSION }}-macOS-x86_64.dmg"
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-${{ env.VERSION }}
          path: MochaTools-*-macOS-x86_64.dmg

  # ──────────────────────────────────────────────
  # Draft release — collects all platform builds
  # ──────────────────────────────────────────────
  release:
    name: Create Draft Release
    needs: [build, build-macos-arm64, build-macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: debian_ubuntu-deb-${{ env.VERSION }}
          path: release-assets

      - name: Download Linux tarball
        uses: actions/download-artifact@v4
        with:
          name: debian_ubuntu-tar-${{ env.VERSION }}
          path: release-assets

      - name: Download Windows portable exe
        uses: actions/download-artifact@v4
        with:
          name: windows-portable-${{ env.VERSION }}
          path: release-assets

      - name: Download Windows installer exe
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: release-assets

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-${{ env.VERSION }}
          path: release-assets

      - name: Download macos-x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-${{ env.VERSION }}
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }} -
          draft: true
          files: release-assets/*